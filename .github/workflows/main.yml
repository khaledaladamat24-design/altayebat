name: Build Android App

on:
  push:
    branches: [main]
    paths:
      - "artifacts/al-tayebat/**"
      - "lib/**"
      - "pnpm-workspace.yaml"
      - ".github/workflows/main.yml"
      - ".github/workflows/android-build.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build signed APK + AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web bundle
        working-directory: artifacts/al-tayebat
        env:
          PORT: "5173"
          BASE_PATH: "./"
          NODE_ENV: "production"
        run: pnpm run build

      - name: Add Android platform (if missing)
        working-directory: artifacts/al-tayebat
        run: |
          if [ ! -d "android" ]; then
            pnpm exec cap add android
          fi

      - name: Copy google-services.json into Android app
        working-directory: artifacts/al-tayebat
        run: |
          if [ -f "google-services.json" ]; then
            cp google-services.json android/app/google-services.json
            echo "google-services.json copied"
          fi

      - name: Sync Capacitor
        working-directory: artifacts/al-tayebat
        run: pnpm exec cap sync android

      - name: Ensure sharp native binary for linux-x64
        working-directory: artifacts/al-tayebat
        run: pnpm rebuild sharp || true

      - name: Generate app icons + splash from resources/icon.png
        working-directory: artifacts/al-tayebat
        run: |
          pnpm exec capacitor-assets generate --android \
            --iconBackgroundColor '#ffffff' \
            --iconBackgroundColorDark '#1f5135' \
            --splashBackgroundColor '#1f5135' \
            --splashBackgroundColorDark '#1f5135' || echo "::warning::Asset generation failed"

      - name: Decode release keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::warning::ANDROID_KEYSTORE_BASE64 not set"
            exit 0
          fi
          echo "$KEYSTORE_B64" | base64 -d > artifacts/al-tayebat/android/app/release.keystore
          echo "KEYSTORE_PRESENT=true" >> $GITHUB_ENV

      - name: Inject signing config into build.gradle
        if: env.KEYSTORE_PRESENT == 'true'
        working-directory: artifacts/al-tayebat/android/app
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          python3 <<'PY'
          import os, re, pathlib
          p = pathlib.Path("build.gradle")
          src = p.read_text()
          signing_block = f'''
              signingConfigs {{
                  release {{
                      storeFile file('release.keystore')
                      storePassword "{os.environ['KEYSTORE_PASSWORD']}"
                      keyAlias "{os.environ['KEY_ALIAS']}"
                      keyPassword "{os.environ['KEY_PASSWORD']}"
                  }}
              }}
          '''
          if "signingConfigs {" not in src:
              src = re.sub(r"(android\s*\{)", r"\1\n" + signing_block, src, count=1)
          src = re.sub(
              r"buildTypes\s*\{\s*release\s*\{",
              "buildTypes {\n        release {\n            signingConfig signingConfigs.release",
              src, count=1,
          )
          p.write_text(src)
          PY

      - name: Build release APK
        if: env.KEYSTORE_PRESENT == 'true'
        working-directory: artifacts/al-tayebat/android
        run: ./gradlew assembleRelease

      - name: Build release AAB
        if: env.KEYSTORE_PRESENT == 'true'
        working-directory: artifacts/al-tayebat/android
        run: ./gradlew bundleRelease

      - name: Build debug APK (always — for on-device chrome://inspect debugging)
        working-directory: artifacts/al-tayebat/android
        run: ./gradlew assembleDebug

      - name: Upload signed release APK
        if: env.KEYSTORE_PRESENT == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: al-tayebat-release-apk
          path: artifacts/al-tayebat/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload signed release AAB
        if: env.KEYSTORE_PRESENT == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: al-tayebat-release-aab
          path: artifacts/al-tayebat/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: al-tayebat-debug-apk
          path: artifacts/al-tayebat/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
