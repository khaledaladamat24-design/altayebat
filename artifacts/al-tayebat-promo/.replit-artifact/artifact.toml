kind = "video"
previewPath = "/al-tayebat-promo/"
title = "إعلان الطيبات - Al-Tayebat Promo"
version = "1.0.0"
id = "artifacts/al-tayebat-promo"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/al-tayebat-promo/" ]
localPort = 22842

[services.development]
run = "pnpm --filter @workspace/al-tayebat-promo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/al-tayebat-promo", "run", "build" ]
publicDir = "artifacts/al-tayebat-promo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22842"
BASE_PATH = "/al-tayebat-promo/"
