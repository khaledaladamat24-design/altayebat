openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Al-Tayebat - Healthy Food & Keto Products API for Jordan
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: categories
    description: Product categories
  - name: products
    description: Products and items
  - name: cart
    description: Shopping cart
  - name: orders
    description: Customer orders
  - name: banners
    description: Home page banners
  - name: summary
    description: Store summary and stats

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      parameters:
        - name: foodType
          in: query
          required: false
          schema:
            type: string
            enum: [healthy, regular]
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /categories/{id}:
    get:
      operationId: getCategory
      tags: [categories]
      summary: Get a category by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Not found

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products with optional filters
      parameters:
        - name: categoryId
          in: query
          required: false
          schema:
            type: integer
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: featured
          in: query
          required: false
          schema:
            type: boolean
        - name: foodType
          in: query
          required: false
          schema:
            type: string
            enum: [healthy, regular]
        - name: onSale
          in: query
          required: false
          schema:
            type: boolean
        - name: subcategory
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found

  /products/featured:
    get:
      operationId: listFeaturedProducts
      tags: [products]
      summary: Get featured/promoted products
      parameters:
        - name: foodType
          in: query
          required: false
          schema:
            type: string
            enum: [healthy, regular]
      responses:
        "200":
          description: Featured products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/bestsellers:
    get:
      operationId: listBestsellers
      tags: [products]
      summary: Get best-selling products
      parameters:
        - name: foodType
          in: query
          required: false
          schema:
            type: string
            enum: [healthy, regular]
      responses:
        "200":
          description: Bestselling products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /cart:
    get:
      operationId: getCart
      tags: [cart]
      summary: Get current cart
      parameters:
        - name: sessionId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
    post:
      operationId: addToCart
      tags: [cart]
      summary: Add item to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemInput"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
    delete:
      operationId: clearCart
      tags: [cart]
      summary: Clear all cart items
      parameters:
        - name: sessionId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Empty cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /cart/{itemId}:
    patch:
      operationId: updateCartItem
      tags: [cart]
      summary: Update quantity of a cart item
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemUpdate"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
    delete:
      operationId: removeFromCart
      tags: [cart]
      summary: Remove an item from cart
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders (guest or user)
      parameters:
        - name: sessionId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found

  /banners:
    get:
      operationId: listBanners
      tags: [banners]
      summary: Get home page promotional banners
      responses:
        "200":
          description: Banners list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Banner"

  /summary:
    get:
      operationId: getStoreSummary
      tags: [summary]
      summary: Get store stats summary (product count per category, total products)
      responses:
        "200":
          description: Store summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Category:
      type: object
      required: [id, name, nameAr, slug, icon, productCount]
      properties:
        id:
          type: integer
        name:
          type: string
        nameAr:
          type: string
        slug:
          type: string
        icon:
          type: string
        imageUrl:
          type: ["string", "null"]
        foodType:
          type: string
          enum: [healthy, regular]
        productCount:
          type: integer
        sortOrder:
          type: integer

    Product:
      type: object
      required: [id, nameAr, name, price, categoryId, inStock]
      properties:
        id:
          type: integer
        name:
          type: string
        nameAr:
          type: string
        description:
          type: ["string", "null"]
        descriptionAr:
          type: ["string", "null"]
        price:
          type: number
        originalPrice:
          type: ["number", "null"]
        imageUrl:
          type: ["string", "null"]
        categoryId:
          type: integer
        categoryName:
          type: ["string", "null"]
        categoryNameAr:
          type: ["string", "null"]
        inStock:
          type: boolean
        isFeatured:
          type: boolean
        isBestseller:
          type: boolean
        isKeto:
          type: boolean
        isOrganic:
          type: boolean
        weightOrVolume:
          type: ["string", "null"]
        rating:
          type: ["number", "null"]
        reviewCount:
          type: integer
        vendorId:
          type: ["integer", "null"]
        vendorName:
          type: ["string", "null"]
        vendorNameAr:
          type: ["string", "null"]
        foodType:
          type: string
          enum: [healthy, regular]
        isOnSale:
          type: boolean
        subcategory:
          type: ["string", "null"]
        calories:
          type: ["integer", "null"]
        protein:
          type: ["number", "null"]
        carbs:
          type: ["number", "null"]
        fats:
          type: ["number", "null"]

    CartItem:
      type: object
      required:
        [
          id,
          productId,
          quantity,
          unitPrice,
          totalPrice,
          productNameAr,
          productName,
        ]
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        productNameAr:
          type: string
        productImageUrl:
          type: ["string", "null"]
        quantity:
          type: integer
        unitPrice:
          type: number
        totalPrice:
          type: number

    Cart:
      type: object
      required: [sessionId, items, subtotal, deliveryFee, total, itemCount]
      properties:
        sessionId:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        subtotal:
          type: number
        deliveryFee:
          type: number
        total:
          type: number
        itemCount:
          type: integer

    CartItemInput:
      type: object
      required: [productId, quantity]
      properties:
        sessionId:
          type: string
        productId:
          type: integer
        quantity:
          type: integer

    CartItemUpdate:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer

    Order:
      type: object
      required:
        [
          id,
          status,
          total,
          deliveryFee,
          subtotal,
          createdAt,
          items,
          deliveryAddress,
        ]
      properties:
        id:
          type: integer
        sessionId:
          type: ["string", "null"]
        status:
          type: string
          enum:
            [pending, confirmed, preparing, on_the_way, delivered, cancelled]
        subtotal:
          type: number
        deliveryFee:
          type: number
        total:
          type: number
        deliveryAddress:
          type: string
        customerName:
          type: ["string", "null"]
        customerPhone:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        estimatedDelivery:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"

    OrderItem:
      type: object
      required:
        [
          id,
          productId,
          productNameAr,
          productName,
          quantity,
          unitPrice,
          totalPrice,
        ]
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        productNameAr:
          type: string
        productImageUrl:
          type: ["string", "null"]
        quantity:
          type: integer
        unitPrice:
          type: number
        totalPrice:
          type: number

    OrderInput:
      type: object
      required: [deliveryAddress, customerName, customerPhone]
      properties:
        sessionId:
          type: string
        deliveryAddress:
          type: string
        customerName:
          type: string
        customerPhone:
          type: string
        notes:
          type: string

    Banner:
      type: object
      required: [id, title, titleAr, imageUrl]
      properties:
        id:
          type: integer
        title:
          type: string
        titleAr:
          type: string
        subtitle:
          type: ["string", "null"]
        subtitleAr:
          type: ["string", "null"]
        imageUrl:
          type: string
        linkType:
          type: ["string", "null"]
        linkId:
          type: ["integer", "null"]
        badgeText:
          type: ["string", "null"]
        badgeTextAr:
          type: ["string", "null"]

    StoreSummary:
      type: object
      required: [totalProducts, totalCategories, categoryCounts]
      properties:
        totalProducts:
          type: integer
        totalCategories:
          type: integer
        featuredCount:
          type: integer
        bestsellersCount:
          type: integer
        ketoCount:
          type: integer
        categoryCounts:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"

    CategoryCount:
      type: object
      required: [categoryId, categoryNameAr, categoryName, count]
      properties:
        categoryId:
          type: integer
        categoryName:
          type: string
        categoryNameAr:
          type: string
        count:
          type: integer
